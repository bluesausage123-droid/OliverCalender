<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>火星提醒管家 V2</title>
    
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCAxMDAgMTAwIj48Y2lyY2xlIGN4PSI1MCIgY3k9IjUwIiByPSI0OCIgZmlsbD0iI2ZmNTcyMiIgc3Ryb2tlPSIjYmYzNjBjIiBzdHJva2Utd2lkdGg9IjIiLz48ZWxsaXBzZSBjeD0iMzAiIGN5PSI0MCIgcng9IjEwIiByeT0iNyIgZmlsbD0iI2JmMzYwYyIgb3BhY2l0eT0iMC43Ii8+PGVsbGlwc2UgY3g9IjcwIiBjeT0iNjAiIHJ4PSI4IiByeT0iNSIgZmlsbD0iI2JmMzYwYyIgb3BhY2l0eT0iMC43Ii8+PHBhdGggZD0iTSAxNSA2NSBRIDQwIDgwIDg1IDU1IiBzdHJva2U9IiNiZjM2MGMiIHN0cm9rZS13aWR0aD0iMyIgZmlsbD0ibm9uZSIgb3BhY2l0eT0iMC44Ii8+PC9zdmc+">

    <style>
        :root { --mars-red: #bf360c; --mars-orange: #ff5722; }
        body { font-family: "PingFang TC", "Microsoft JhengHei", sans-serif; background: #fdfdfd; padding: 20px; text-align: center; }
        .container { max-width: 600px; margin: auto; }
        h1 { font-size: 2.5rem; color: var(--mars-red); margin-bottom: 20px; }

        /* 導引標記：輸入區域美化 */
        .card { background: white; padding: 25px; border-radius: 30px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); text-align: left; margin-bottom: 25px; }
        label { font-size: 1.4rem; font-weight: bold; color: var(--mars-red); }
        input { width: 100%; padding: 15px; font-size: 1.6rem; margin: 10px 0 20px 0; border-radius: 12px; border: 3px solid #ccc; box-sizing: border-box; }
        
        .btn { width: 100%; padding: 20px; font-size: 1.8rem; border-radius: 15px; border: none; font-weight: bold; cursor: pointer; margin-bottom: 10px; }
        .btn-save { background: var(--mars-red); color: white; }
        .btn-voice { background: #03a9f4; color: white; }
        .btn-edit { background: #ff9800; color: white; }

        /* 提醒事項清單 */
        .item { background: white; padding: 15px; margin-top: 10px; border-radius: 15px; display: flex; justify-content: space-between; align-items: center; border-left: 15px solid var(--mars-red); box-shadow: 0 4px 8px rgba(0,0,0,0.05); }
        .item-info { text-align: left; flex: 1; }
        .item-info b { font-size: 1.8rem; display: block; }
        .item-info span { font-size: 1.2rem; color: #666; }
        .btn-group { display: flex; gap: 5px; }
        .small-btn { padding: 8px 12px; border-radius: 8px; border: 1px solid #ccc; font-size: 1rem; cursor: pointer; }
    </style>
</head>
<body>

<div class="container">
    <h1>🚀 火星行程管家</h1>
    
    <div class="card">
        <label>行程內容：</label>
        <input type="text" id="tName" placeholder="例如：去醫院看醫生">
        
        <label>提醒時間：</label>
        <input type="datetime-local" id="tTime">
        
        <button class="btn btn-voice" id="voiceBtn" onclick="startVoice()">🎤 按一下用說的</button>
        <button class="btn btn-save" id="saveBtn" onclick="saveTask()">💾 記下來</button>
    </div>

    <div id="taskList"></div>
</div>

<script>
    let editingId = null; // 導引標記：紀錄目前是否在編輯狀態

    window.onload = () => {
        if ("Notification" in window) Notification.requestPermission();
        // 預設填入現在時間
        const now = new Date();
        now.setMinutes(now.getMinutes() - now.getTimezoneOffset());
        document.getElementById('tTime').value = now.toISOString().slice(0, 16);
        render();
        setInterval(checkReminders, 5000); // 縮短檢查時間至5秒，增加準確度
    };

    // 導引標記：智慧語音填入邏輯
    function startVoice() {
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (!SpeechRecognition) return alert("這台設備不支援語音。");
        
        const rec = new SpeechRecognition();
        rec.lang = 'zh-TW';
        rec.onstart = () => document.getElementById('voiceBtn').innerText = "👂 正在聽...";
        rec.onresult = (e) => {
            const result = e.results[0][0].transcript;
            document.getElementById('tName').value = result;
            
            // 嘗試從語音中抓取數字作為日期時間的輔助提示（進階功能）
            parseVoiceToTime(result); 
        };
        rec.onend = () => document.getElementById('voiceBtn').innerText = "🎤 按一下用說的";
        rec.start();
    }

    // 導引標記：簡單解析語音中的時間數字
    function parseVoiceToTime(text) {
        // 尋找如 "12點" 或 "3點" 的數字
        const timeMatch = text.match(/(\d{1,2})[點時]/);
        if (timeMatch) {
            const hour = timeMatch[1].padStart(2, '0');
            const currentTime = document.getElementById('tTime').value;
            document.getElementById('tTime').value = currentTime.slice(0, 11) + hour + ":00";
        }
    }

    function saveTask() {
        const name = document.getElementById('tName').value;
        const time = document.getElementById('tTime').value;
        if (!name) return alert("請輸入內容");

        let tasks = JSON.parse(localStorage.getItem('mars_tasks') || '[]');

        if (editingId) {
            // 編輯模式
            tasks = tasks.map(t => t.id === editingId ? { ...t, name, time, done: false } : t);
            editingId = null;
            document.getElementById('saveBtn').innerText = "💾 記下來";
            document.getElementById('saveBtn').classList.remove('btn-edit');
        } else {
            // 新增模式
            tasks.push({ id: Date.now(), name, time, done: false });
        }

        localStorage.setItem('mars_tasks', JSON.stringify(tasks));
        document.getElementById('tName').value = "";
        render();
    }

    function render() {
        const listDiv = document.getElementById('taskList');
        const tasks = JSON.parse(localStorage.getItem('mars_tasks') || '[]');
        listDiv.innerHTML = tasks.sort((a,b)=>new Date(a.time)-new Date(b.time)).map(t => `
            <div class="item">
                <div class="item-info">
                    <b>${t.name}</b>
                    <span>⏰ ${t.time.replace('T', ' ')}</span>
                </div>
                <div class="btn-group">
                    <button class="small-btn" onclick="editTask(${t.id})">改一下</button>
                    <button class="small-btn" style="color:red" onclick="deleteTask(${t.id})">刪除</button>
                </div>
            </div>
        `).join('');
    }

    // 導引標記：編輯功能
    function editTask(id) {
        const tasks = JSON.parse(localStorage.getItem('mars_tasks') || '[]');
        const task = tasks.find(t => t.id === id);
        if (task) {
            document.getElementById('tName').value = task.name;
            document.getElementById('tTime').value = task.time;
            editingId = id;
            document.getElementById('saveBtn').innerText = "🆙 改好了！";
            document.getElementById('saveBtn').classList.add('btn-edit');
            window.scrollTo(0, 0); // 滾動回頂端方便編輯
        }
    }

    function deleteTask(id) {
        let tasks = JSON.parse(localStorage.getItem('mars_tasks') || '[]');
        localStorage.setItem('mars_tasks', JSON.stringify(tasks.filter(t=>t.id!==id)));
        render();
    }

    // 導引標記：修正提醒功能（多重提醒機制）
    function checkReminders() {
        let tasks = JSON.parse(localStorage.getItem('mars_tasks') || '[]');
        const now = new Date();
        let updated = false;

        tasks.forEach(t => {
            const alarmTime = new Date(t.time);
            // 修正：增加 1 分鐘內的容錯判斷，避免錯過秒數
            if (alarmTime <= now && !t.done) {
                fireReminder(t.name);
                t.done = true;
                updated = true;
            }
        });
        if (updated) {
            localStorage.setItem('mars_tasks', JSON.stringify(tasks));
            render();
        }
    }

    function fireReminder(name) {
        // 1. 系統通知
        if (Notification.permission === "granted") {
            new Notification("⏰ 時間到囉！", { body: name });
        }
        // 2. 強制語音唸出來（這最有效）
        const utter = new SpeechSynthesisUtterance("時間到囉，記得去做 " + name);
        utter.lang = 'zh-TW';
        utter.volume = 1;
        window.speechSynthesis.speak(utter);
        
        // 3. 彈出視窗（保險機制，防止頁面在背景沒聲音）
        setTimeout(() => {
            alert("⏰ 提醒時間到！\n\n內容：" + name);
        }, 500);
    }
</script>
</body>
</html>
