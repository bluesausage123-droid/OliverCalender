<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>火星行程管家</title>
    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/svg+xml" href="icon.svg">
    <link rel="apple-touch-icon" href="icon-192.png">
    <style>
        :root { --mars-red: #bf360c; --mars-orange: #ff5722; --active-green: #2e7d32; --snooze-blue: #0277bd; }
        body { font-family: "PingFang TC", "Microsoft JhengHei", sans-serif; background: #fdfdfd; margin: 0; padding: 20px; color: #333; text-align: center; }
        .container { max-width: 600px; margin: 0 auto; display: flex; flex-direction: column; align-items: center; }
        h1 { font-size: 2.8rem; color: var(--mars-red); display: flex; align-items: center; justify-content: center; gap: 10px; margin-bottom: 25px; }
        .header-icon { width: 60px; height: 60px; }
        .card { background: white; padding: 25px; border-radius: 30px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); border: 1px solid #eee; margin-bottom: 25px; width: 100%; box-sizing: border-box; text-align: left; }
        label { font-size: 1.5rem; font-weight: bold; color: var(--mars-red); display: block; margin-bottom: 8px; }
        input { width: 100%; padding: 18px; font-size: 1.8rem; margin-bottom: 20px; border-radius: 15px; border: 3px solid #ccc; box-sizing: border-box; background: #fafafa; }
        .alarm-toggle-area { display: flex; align-items: center; gap: 15px; margin-bottom: 25px; background: #fff3e0; padding: 15px; border-radius: 15px; border: 2px solid #ffcc80; }
        .alarm-toggle-area input[type="checkbox"] { width: 35px; height: 35px; margin: 0; cursor: pointer; }
        .toggle-label { font-size: 1.4rem; font-weight: bold; color: #5d4037; }
        .btn { width: 100%; padding: 22px; font-size: 2.2rem; border-radius: 20px; border: none; font-weight: bold; cursor: pointer; margin-bottom: 15px; }
        .btn-save { background: var(--mars-red); color: white; box-shadow: 0 5px 15px rgba(191, 54, 12, 0.3); }
        .btn-voice { background: #03a9f4; color: white; }
        .btn-voice.recording { background: #f44336; animation: pulse 1s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
        #alarmOverlay { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(191, 54, 12, 0.98); z-index: 9999; color: white; text-align: center; padding: 15% 20px; box-sizing: border-box; }
        #alarmContent { font-size: 3rem; font-weight: bold; margin: 30px 0; }
        .btn-alarm { width: 100%; max-width: 400px; padding: 30px; font-size: 2.2rem; border-radius: 50px; border: none; font-weight: bold; margin-bottom: 20px; cursor: pointer; }
        .btn-stop { background: white; color: var(--mars-red); }
        .btn-snooze { background: var(--snooze-blue); color: white; border: 3px solid white; }
        .item { background: white; padding: 20px; margin-top: 15px; border-radius: 20px; border-left: 15px solid var(--mars-red); box-shadow: 0 5px 15px rgba(0,0,0,0.05); text-align: left; width: 100%; box-sizing: border-box; }
        .item.notified { border-left-color: #ccc; opacity: 0.6; background: #f9f9f9; }
        .item-info b { font-size: 2.2rem; display: block; color: #000; }
        .item-info span { font-size: 1.3rem; color: #666; display: block; }
        .item-tag { display: inline-block; padding: 4px 10px; border-radius: 8px; font-size: 1.2rem; font-weight: bold; margin-top: 10px; }
        .tag-waiting { background: #fff3e0; color: #ef6c00; }
        .tag-done { background: #eee; color: #888; }
    </style>
</head>
<body>

<div id="alarmOverlay">
    <svg style="width:100px; height:100px;" viewBox="0 0 100 100"><circle cx="50" cy="50" r="48" fill="#ff5722" stroke="#bf360c" stroke-width="2"/><ellipse cx="30" cy="40" rx="10" ry="7" fill="#bf360c" opacity="0.7"/><ellipse cx="70" cy="60" rx="8" ry="5" fill="#bf360c" opacity="0.7"/><path d="M 15 65 Q 40 80 85 55" stroke="#bf360c" stroke-width="3" fill="none" opacity="0.8"/></svg>
    <h2 style="font-size: 2rem; margin-top:10px;">火星管家提醒時間到！</h2>
    <div id="alarmContent"></div>
    <button class="btn-alarm btn-stop" onclick="stopAlarm()">🔕 我知道了 (關閉提醒)</button>
    <button class="btn-alarm btn-snooze" id="snoozeBtn">⏰ 延後 10 分鐘再叫我</button>
</div>

<div class="container">
    <h1>
        <svg class="header-icon" viewBox="0 0 100 100"><circle cx="50" cy="50" r="48" fill="#ff5722" stroke="#bf360c" stroke-width="2"/><ellipse cx="30" cy="40" rx="10" ry="7" fill="#bf360c" opacity="0.7"/><ellipse cx="70" cy="60" rx="8" ry="5" fill="#bf360c" opacity="0.7"/><path d="M 15 65 Q 40 80 85 55" stroke="#bf360c" stroke-width="3" fill="none" opacity="0.8"/></svg>
        <span>火星行程管家</span>
    </h1>

    <div class="card">
        <label>1. 要做什麼事？</label>
        <input type="text" id="tName" placeholder="例如：看醫生、吃藥">
        <label>2. 什麼時候提醒？</label>
        <input type="datetime-local" id="tTime">
        <div class="alarm-toggle-area">
            <input type="checkbox" id="tAlarmActive" checked>
            <span class="toggle-label">🔊 時間到要響鈴提醒我</span>
        </div>
        <button class="btn btn-voice" id="voiceBtn" onclick="startVoice()">🎤 用說的也可以</button>
        <button class="btn btn-save" id="saveBtn" onclick="saveTask()">💾 記下來</button>
        <button id="cancelBtn" style="display:none; width:100%; background:none; border:none; color:grey; text-decoration:underline; cursor:pointer;" onclick="cancelEdit()">取消修改</button>
    </div>

<div id="taskList" style="width: 100%;"></div>
</div>

<audio id="alarmSound" loop><source src="https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3" type="audio/mpeg"></audio>

<script>
    let editingId = null;
    let alarmQueue = [];
    let alarmActive = false;
    const sound = document.getElementById('alarmSound');
    const KEY = 'mars_v7_tasks';

    window.onload = () => {
        setDefaultTime();
        render();
        document.body.addEventListener('click', () => { sound.load(); }, { once: true });
        setInterval(checkReminders, 10000);
        registerServiceWorker();
        document.addEventListener('visibilitychange', () => {
            if (!document.hidden) requestSWTaskSync();
        });
    };

    async function registerServiceWorker() {
        if (!('serviceWorker' in navigator)) return;
        try {
            await navigator.serviceWorker.register('./sw.js');
            navigator.serviceWorker.addEventListener('message', handleSWMessage);
            await navigator.serviceWorker.ready;
            await Notification.requestPermission();
            syncTasksToSW();
        } catch(e) {}
    }

    function syncTasksToSW() {
        if (navigator.serviceWorker?.controller)
            navigator.serviceWorker.controller.postMessage({ type: 'SYNC_TASKS', tasks: getTasks() });
    }

    function requestSWTaskSync() {
        if (navigator.serviceWorker?.controller)
            navigator.serviceWorker.controller.postMessage({ type: 'GET_TASKS' });
    }

    function handleSWMessage(e) {
        if (!e.data) return;
        const { type, id, tasks } = e.data;
        if (type === 'ALARM_FIRED') {
            const task = getTasks().find(t => t.id === id);
            if (task && !task.notified) {
                setTasks(getTasks().map(t => t.id === id ? { ...t, notified: true } : t));
                triggerAlarm(task);
                render();
            }
        }
        if (type === 'ALARM_NOTIFIED') {
            setTasks(getTasks().map(t => t.id === id ? { ...t, notified: true } : t));
            render();
        }
        if (type === 'SNOOZED') { requestSWTaskSync(); }
        if (type === 'TASKS_DATA' && tasks) {
            const sMap = new Map(tasks.map(t => [t.id, t]));
            setTasks(getTasks().map(t => { const s = sMap.get(t.id); return s ? { ...t, time: s.time, notified: s.notified } : t; }));
            syncTasksToSW();
            render();
        }
    }

function getTasks() { return JSON.parse(localStorage.getItem(KEY) || '[]'); }
    function setTasks(tasks) { localStorage.setItem(KEY, JSON.stringify(tasks)); }
    function escHtml(str) { return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
    function localTimeStr(date) {
        const pad = n => String(n).padStart(2, '0');
        return `${date.getFullYear()}-${pad(date.getMonth()+1)}-${pad(date.getDate())}T${pad(date.getHours())}:${pad(date.getMinutes())}`;
    }
    function setDefaultTime() { document.getElementById('tTime').value = localTimeStr(new Date()); }

    function saveTask() {
        const name = document.getElementById('tName').value.trim();
        const time = document.getElementById('tTime').value;
        const useAlarm = document.getElementById('tAlarmActive').checked;
        if (!name) return alert("請填寫要做的事情");
        if (!time) return alert("請選擇提醒時間");
        let tasks = getTasks();
        if (editingId) {
            tasks = tasks.map(t => t.id === editingId ? { ...t, name, time, useAlarm, notified: false } : t);
            editingId = null;
            document.getElementById('saveBtn').innerText = "💾 記下來";
            document.getElementById('cancelBtn').style.display = "none";
        } else {
            tasks.push({ id: Date.now(), name, time, useAlarm, notified: false });
        }
        setTasks(tasks);
        syncTasksToSW();
        document.getElementById('tName').value = "";
        setDefaultTime();
        render();
        alert("記好了！");
        if (useAlarm && /android/i.test(navigator.userAgent)) {
            const d = new Date(time);
            const h = d.getHours(), m = d.getMinutes();
            const label = encodeURIComponent(name);
            window.open(
                `intent://SET_ALARM#Intent;scheme=alarm;` +
                `action=android.intent.action.SET_ALARM;` +
                `i.android.intent.extra.alarm.HOUR=${h};` +
                `i.android.intent.extra.alarm.MINUTES=${m};` +
                `S.android.intent.extra.alarm.MESSAGE=${label};` +
                `B.android.intent.extra.alarm.SKIP_UI=true;end`,
                '_blank'
            );
        }
    }

    function render() {
        const listDiv = document.getElementById('taskList');
        listDiv.innerHTML = getTasks()
            .sort((a, b) => new Date(b.time) - new Date(a.time))
            .map(t => `
                <div class="item ${t.notified ? 'notified' : ''}">
                    <div class="item-info">
                        <b>${escHtml(t.name)}</b>
                        <span>⏰ ${escHtml(t.time.replace('T', ' '))}</span>
                        <div class="item-tag ${t.notified ? 'tag-done' : 'tag-waiting'}">
                            ${t.notified ? '✅ 已提醒過您了' : '⏳ 等待提醒中'}
                        </div>
                        <span style="font-size:1rem;color:${t.useAlarm ? 'var(--active-green)' : '#999'}">
                            ${t.useAlarm ? '🔔 響鈴已開啟' : '🔕 僅文字提醒'}
                        </span>
                    </div>
                    <div style="margin-top:15px;display:flex;gap:10px;">
                        <button style="flex:1;padding:10px;border-radius:10px;border:1px solid #ccc;" onclick="editTask(${t.id})">✏️ 修改</button>
                        <button style="flex:1;padding:10px;border-radius:10px;border:1px solid #ccc;color:red;" onclick="deleteTask(${t.id})">❌ 刪除</button>
                    </div>
                </div>
            `).join('');
    }

    function checkReminders() {
        let tasks = getTasks();
        const now = new Date();
        let updated = false;
        tasks.forEach(t => {
            if (!t.notified && new Date(t.time) <= now) {
                triggerAlarm(t);
                t.notified = true;
                updated = true;
            }
        });
        if (updated) { setTasks(tasks); syncTasksToSW(); render(); }
    }

    function triggerAlarm(task) { alarmQueue.push(task); if (!alarmActive) showNextAlarm(); }

    function showNextAlarm() {
        if (alarmQueue.length === 0) { alarmActive = false; return; }
        alarmActive = true;
        const task = alarmQueue.shift();
        document.getElementById('alarmContent').innerText = task.name;
        document.getElementById('alarmOverlay').style.display = 'block';
        document.getElementById('snoozeBtn').onclick = () => snooze(task.id);
        if (task.useAlarm) sound.play().catch(() => {});
        const utter = new SpeechSynthesisUtterance("時間到囉，記得去做 " + task.name);
        utter.lang = 'zh-TW';
        window.speechSynthesis.speak(utter);
    }

    function snooze(id) {
        let tasks = getTasks();
        const idx = tasks.findIndex(t => t.id === id);
        if (idx > -1) {
            tasks[idx].time = localTimeStr(new Date(Date.now() + 10 * 60000));
            tasks[idx].notified = false;
            setTasks(tasks);
            syncTasksToSW();
        }
        stopAlarm();
        render();
        alert("已延後 10 分鐘提醒！");
    }

    function stopAlarm() {
        sound.pause();
        sound.currentTime = 0;
        document.getElementById('alarmOverlay').style.display = 'none';
        window.speechSynthesis.cancel();
        showNextAlarm();
    }

    function editTask(id) {
        const task = getTasks().find(t => t.id === id);
        if (task) {
            document.getElementById('tName').value = task.name;
            document.getElementById('tTime').value = task.time;
            document.getElementById('tAlarmActive').checked = task.useAlarm;
            editingId = id;
            document.getElementById('saveBtn').innerText = "🆙 更新行程";
            document.getElementById('cancelBtn').style.display = "block";
            window.scrollTo(0, 0);
        }
    }

    function cancelEdit() {
        editingId = null;
        document.getElementById('tName').value = "";
        setDefaultTime();
        document.getElementById('saveBtn').innerText = "💾 記下來";
        document.getElementById('cancelBtn').style.display = "none";
    }

    function deleteTask(id) {
        if (editingId === id) cancelEdit();
        setTasks(getTasks().filter(t => t.id !== id));
        syncTasksToSW();
        render();
    }


function startVoice() {
        const SpeechRec = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (!SpeechRec) return alert("您的瀏覽器不支援語音輸入，請直接打字");
        const btn = document.getElementById('voiceBtn');
        try {
            const rec = new SpeechRec();
            rec.lang = 'zh-TW';
            rec.onstart = () => { btn.classList.add('recording'); btn.innerText = "正在聽..."; };
            rec.onresult = (e) => { document.getElementById('tName').value = e.results[0][0].transcript; };
            rec.onerror = () => { btn.classList.remove('recording'); btn.innerText = "🎤 用說的也可以"; alert("語音辨識失敗，請重試"); };
            rec.onend = () => { btn.classList.remove('recording'); btn.innerText = "🎤 用說的也可以"; };
            rec.start();
        } catch (err) {
            alert("語音功能無法啟動：" + err.message);
        }
    }
</script>
</body>
</html>
