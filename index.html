<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>三星平板貼心管家</title>
    <style>
        body { font-family: sans-serif; background: #f0f2f5; padding: 20px; text-align: center; }
        .container { max-width: 700px; margin: auto; }
        h1 { font-size: 3.5rem; color: #075e54; }
        .box { background: white; padding: 30px; border-radius: 30px; box-shadow: 0 8px 20px rgba(0,0,0,0.1); margin-bottom: 20px; }
        input { width: 90%; padding: 20px; font-size: 1.8rem; margin: 15px 0; border-radius: 15px; border: 3px solid #ddd; }
        button { width: 95%; padding: 25px; font-size: 2.2rem; border-radius: 20px; border: none; font-weight: bold; cursor: pointer; margin-top: 15px; }
        .btn-add { background: #128c7e; color: white; }
        .btn-voice { background: #34b7f1; color: white; }
        .item { background: white; padding: 20px; margin-top: 15px; border-radius: 20px; display: flex; justify-content: space-between; align-items: center; border-left: 20px solid #128c7e; }
        .item-info { text-align: left; }
        .item-info b { font-size: 2rem; }
        .item-info p { font-size: 1.4rem; color: #555; margin: 5px 0; }
        .btn-del { background: #ece5dd; color: #d32f2f; width: auto; padding: 10px 20px; font-size: 1.2rem; }
    </style>
</head>
<body>

<div class="container">
    <h1>📅 提醒小幫手</h1>
    <div class="box">
        <input type="text" id="tName" placeholder="要做什麼事？">
        <input type="datetime-local" id="tTime">
        <button class="btn-add" onclick="save()">💾 幫我記住</button>
        <button class="btn-voice" onclick="speakInput()">🎤 用說的</button>
    </div>
    <div id="list"></div>
</div>

<script>
    // 導引標記：三星平板震動與語音功能
    function save() {
        const name = document.getElementById('tName').value;
        const time = document.getElementById('tTime').value;
        if(!name || !time) return alert("請填寫內容跟時間");
        
        let tasks = JSON.parse(localStorage.getItem('samsung_tasks') || '[]');
        tasks.push({ id: Date.now(), name, time, done: false });
        localStorage.setItem('samsung_tasks', JSON.stringify(tasks));
        show();
        alert("記好了！");
    }

    function show() {
        const list = document.getElementById('list');
        let tasks = JSON.parse(localStorage.getItem('samsung_tasks') || '[]');
        list.innerHTML = tasks.sort((a,b)=>new Date(a.time)-new Date(b.time)).map(t => `
            <div class="item">
                <div class="item-info">
                    <b>${t.name}</b>
                    <p>時間：${t.time.replace('T', ' ')}</p>
                </div>
                <button class="btn-del" onclick="del(${t.id})">刪除</button>
            </div>
        `).join('');
    }

    function del(id) {
        let tasks = JSON.parse(localStorage.getItem('samsung_tasks') || '[]');
        localStorage.setItem('samsung_tasks', JSON.stringify(tasks.filter(t=>t.id!==id)));
        show();
    }

    setInterval(() => {
        let tasks = JSON.parse(localStorage.getItem('samsung_tasks') || '[]');
        const now = new Date();
        tasks.forEach(t => {
            if (new Date(t.time) <= now && !t.done) {
                // 執行提醒
                if (Notification.permission === "granted") new Notification("時間到！", { body: t.name });
                
                // 導引標記：加入震動功能 (僅限 Android)
                if (navigator.vibrate) navigator.vibrate([500, 200, 500]); 

                // 語音報時
                const utter = new SpeechSynthesisUtterance("時間到囉，記得去做" + t.name);
                utter.lang = 'zh-TW';
                window.speechSynthesis.speak(utter);
                
                t.done = true;
                localStorage.setItem('samsung_tasks', JSON.stringify(tasks));
            }
        });
    }, 10000);

    function speakInput() {
        const rec = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
        rec.lang = 'zh-TW';
        rec.onresult = (e) => document.getElementById('tName').value = e.results[0][0].transcript;
        rec.start();
    }
    
    window.onload = () => { Notification.requestPermission(); show(); };
</script>
</body>
</html>
