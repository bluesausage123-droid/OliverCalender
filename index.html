<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>火星行程管家</title>
    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCAxMDAgMTAwIj48Y2lyY2xlIGN4PSI1MCIgY3k9IjUwIiByPSI0OCIgZmlsbD0iI2ZmNTcyMiIgc3Ryb2tlPSIjYmYzNjBjIiBzdHJva2Utd2lkdGg9IjIiLz48ZWxsaXBzZSBjeD0iMzAiIGN5PSI0MCIgcng9IjEwIiByeT0iNyIgZmlsbD0iI2JmMzYwYyIgb3BhY2l0eT0iMC43Ii8+PGVsbGlwc2UgY3g9IjcwIiBjeT0iNjAiIHJ4PSI4IiByeT0iNSIgZmlsbD0iI2JmMzYwYyIgb3BhY2l0eT0iMC43Ii8+PHBhdGggZD0iTSAxNSA2NSBRIDQwIDgwIDg1IDU1IiBzdHJva2U9IiNiZjM2MGMiIHN0cm9rZS13aWR0aD0iMyIgZmlsbD0ibm9uZSIgb3BhY2l0eT0iMC44Ii8+PC9zdmc+">
    <link rel="apple-touch-icon" href="data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCAxMDAgMTAwIj48Y2lyY2xlIGN4PSI1MCIgY3k9IjUwIiByPSI0OCIgZmlsbD0iI2ZmNTcyMiIgc3Ryb2tlPSIjYmYzNjBjIiBzdHJva2Utd2lkdGg9IjIiLz48ZWxsaXBzZSBjeD0iMzAiIGN5PSI0MCIgcng9IjEwIiByeT0iNyIgZmlsbD0iI2JmMzYwYyIgb3BhY2l0eT0iMC43Ii8+PGVsbGlwc2UgY3g9IjcwIiBjeT0iNjAiIHJ4PSI4IiByeT0iNSIgZmlsbD0iI2JmMzYwYyIgb3BhY2l0eT0iMC43Ii8+PHBhdGggZD0iTSAxNSA2NSBRIDQwIDgwIDg1IDU1IiBzdHJva2U9IiNiZjM2MGMiIHN0cm9rZS13aWR0aD0iMyIgZmlsbD0ibm9uZSIgb3BhY2l0eT0iMC44Ii8+PC9zdmc+">

    <style>
        :root { --mars-red: #bf360c; --mars-orange: #ff5722; --active-green: #2e7d32; --edit-orange: #fb8c00; }
        
        /* 導引標記：版面全面置中 */
        body { font-family: "PingFang TC", "Microsoft JhengHei", sans-serif; background: #fdfdfd; padding: 20px; text-align: center; color: #333; line-height: 1.6; margin: 0; }
        .container { max-width: 600px; margin: 0 auto; display: flex; flex-direction: column; align-items: center; }
        
        /* 導引標記：標題置中，火箭改火星 SVG */
        h1 { font-size: 2.8rem; color: var(--mars-red); display: flex; align-items: center; justify-content: center; gap: 15px; margin-bottom: 25px; width: 100%; }
        .header-icon { width: 60px; height: 60px; }

        .card { background: white; padding: 25px; border-radius: 30px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); border: 1px solid #eee; margin-bottom: 25px; text-align: left; width: 100%; box-sizing: border-box; }
        label { font-size: 1.5rem; font-weight: bold; color: var(--mars-red); display: block; margin-bottom: 8px; }
        
        input[type="text"], input[type="datetime-local"] { width: 100%; padding: 20px; font-size: 1.8rem; margin-bottom: 20px; border-radius: 15px; border: 3px solid #ccc; box-sizing: border-box; background: #fafafa; }
        input[type="text"]:focus, input[type="datetime-local"]:focus { border-color: var(--mars-orange); outline: none; background: white; }

        /* 導引標記：鬧鐘開關 checkbox 回來了 */
        .switch-area { display: flex; align-items: center; gap: 15px; margin-bottom: 25px; background: #fff3e0; padding: 15px; border-radius: 15px; border: 1px solid #ffcc80; box-shadow: inset 0 2px 5px rgba(0,0,0,0.05); }
        .switch-label { font-size: 1.4rem; font-weight: bold; }
        input[type="checkbox"] { width: 30px; height: 30px; cursor: pointer; margin: 0; }

        .btn { width: 100%; padding: 20px; font-size: 2rem; border-radius: 20px; border: none; font-weight: bold; cursor: pointer; margin-bottom: 15px; display: block; box-sizing: border-box; }
        .btn-voice { background: #03a9f4; color: white; transition: all 0.3s; }
        .btn-voice.recording { background: #f44336; animation: pulse 1.2s infinite; transform: scale(1.02); }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(244, 67, 54, 0.7); } 70% { box-shadow: 0 0 0 20px rgba(244, 67, 54, 0); } 100% { box-shadow: 0 0 0 0 rgba(244, 67, 54, 0); } }

        .btn-save { background: var(--mars-red); color: white; }
        .btn-update { background: var(--edit-orange); color: white; }

        /* 提醒中的覆蓋層面 */
        #alarmOverlay { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(191, 54, 12, 0.98); z-index: 9999; color: white; text-align: center; padding-top: 15%; box-sizing: border-box; flex-direction: column; align-items: center; }
        .alarm-overlay-icon { width: 120px; height: 120px; margin-bottom: 20px; }
        #alarmText { font-size: 4rem; margin-top: 0; }
        .btn-stop { background: white; color: var(--mars-red); padding: 30px; font-size: 2.5rem; border-radius: 50px; width: 80%; border: none; font-weight: bold; cursor: pointer; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }

        /* 行程清單 */
        .item { background: white; padding: 20px; margin-top: 15px; border-radius: 20px; display: flex; flex-direction: column; border-left: 15px solid var(--mars-red); box-shadow: 0 5px 15px rgba(0,0,0,0.05); text-align: left; width: 100%; box-sizing: border-box; }
        
        /* 導引標記：已提醒行程的樣式 */
        .item.notified { border-left-color: #ccc; background: #f9f9f9; opacity: 0.8; color: #666; box-shadow: none; border-left-width: 10px; }
        .item-info b { font-size: 2.2rem; display: block; color: #000; margin-bottom: 5px; }
        .item.notified .item-info b { color: #555; }
        .item-info span { font-size: 1.3rem; color: #666; display: block; margin-bottom: 10px; }
        
        .status-tag { display: inline-block; padding: 4px 10px; border-radius: 8px; font-size: 1.2rem; font-weight: bold; margin-bottom: 15px; }
        .tag-waiting { background: #fff3e0; color: #ef6c00; }
        .tag-notified { background: #eee; color: #888; }

        .item-actions { display: flex; gap: 10px; }
        .btn-action { padding: 10px 20px; border-radius: 12px; border: 1px solid #ccc; font-size: 1.2rem; cursor: pointer; font-weight: bold; }
        .btn-edit { background: #fff3e0; color: #ef6c00; border-color: #ffcc80; }
        .btn-del { background: #ffebee; color: #d32f2f; border-color: #ffcdd2; }
    </style>
</head>
<body>

<div id="alarmOverlay">
    <svg class="alarm-overlay-icon" viewBox="0 0 100 100"><circle cx="50" cy="50" r="48" fill="#ff5722" stroke="#bf360c" stroke-width="2"/><ellipse cx="30" cy="40" rx="10" ry="7" fill="#bf360c" opacity="0.7"/><ellipse cx="70" cy="60" rx="8" ry="5" fill="#bf360c" opacity="0.7"/><path d="M 15 65 Q 40 80 85 55" stroke="#bf360c" stroke-width="3" fill="none" opacity="0.8"/></svg>
    <h2 id="alarmText">⏰ 時間到囉！</h2>
    <p id="alarmContent" style="font-size: 2.5rem;"></p>
    <button class="btn-stop" onclick="stopAlarm()">🔕 我知道了 (關閉)</button>
</div>

<div class="container">
    <h1>
        <svg class="header-icon" viewBox="0 0 100 100"><circle cx="50" cy="50" r="48" fill="#ff5722" stroke="#bf360c" stroke-width="2"/><ellipse cx="30" cy="40" rx="10" ry="7" fill="#bf360c" opacity="0.7"/><ellipse cx="70" cy="60" rx="8" ry="5" fill="#bf360c" opacity="0.7"/><path d="M 15 65 Q 40 80 85 55" stroke="#bf360c" stroke-width="3" fill="none" opacity="0.8"/></svg>
        <span>火星行程管家</span>
    </h1>
    
    <div class="card">
        <label>行程：</label>
        <input type="text" id="tName" placeholder="例如：去醫院看醫生">
        
        <label>提醒時間：</label>
        <input type="datetime-local" id="tTime">
        
        <div class="switch-area">
            <input type="checkbox" id="tAlarmActive" checked>
            <span class="switch-label">🔊 時間到要響鈴提醒我</span>
        </div>

        <button class="btn btn-voice" id="voiceBtn" onclick="startVoice()">🎤 用說的也可以</button>
        <button class="btn btn-save" id="saveBtn" onclick="saveTask()">💾 記下來</button>
        <button id="cancelEdit" style="display:none; width:100%; background:none; border:none; color:grey; text-decoration:underline; cursor:pointer; font-size: 1.2rem; margin-top: 10px;" onclick="cancelEdit()">取消修改</button>
    </div>

    <div id="taskList"></div>
</div>

<audio id="alarmSound" loop><source src="https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3" type="audio/mpeg"></audio>

<script>
    let editingId = null;
    const sound = document.getElementById('alarmSound');
    const LOCAL_STORAGE_KEY = 'mars_tasks_v5'; // 更新鍵名避免版本衝突

    // 註冊 PWA Service Worker (用戶自己去建立檔案)
    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('sw.js');
    }

    window.onload = () => {
        if ("Notification" in window) Notification.requestPermission();
        setDefaultTime();
        render();
        // 用戶第一次點擊頁面時，解鎖音頻播放限制
        document.body.addEventListener('click', () => { sound.load(); }, { once: true });
        setInterval(checkReminders, 10000); // 每10秒檢查一次
    };

    function setDefaultTime() {
        const now = new Date();
        now.setMinutes(now.getMinutes() - now.getTimezoneOffset());
        document.getElementById('tTime').value = now.toISOString().slice(0, 16);
    }

    // 資料結構：{id, name, time, status: 'waiting'|'notified', useAlarm: boolean}
    function saveTask() {
        const name = document.getElementById('tName').value;
        const time = document.getElementById('tTime').value;
        const useAlarm = document.getElementById('tAlarmActive').checked; // 讀取 checkbox 狀態

        if (!name) { alert("請告訴我要做什麼事喔！"); return; }
        
        let tasks = JSON.parse(localStorage.getItem(LOCAL_STORAGE_KEY) || '[]');

        if (editingId) {
            // 編輯模式：更新舊資料，將狀態重設為等待
            tasks = tasks.map(t => t.id === editingId ? { ...t, name, time, status: 'waiting', useAlarm } : t);
            editingId = null;
            resetUI();
        } else {
            // 新增模式：狀態為等待
            tasks.push({ id: Date.now(), name, time, status: 'waiting', useAlarm });
        }

        localStorage.setItem(LOCAL_STORAGE_KEY, JSON.stringify(tasks));
        document.getElementById('tName').value = "";
        setDefaultTime();
        render();
        alert("記好了！");
    }

    function render() {
        const listDiv = document.getElementById('taskList');
        const tasks = JSON.parse(localStorage.getItem(LOCAL_STORAGE_KEY) || '[]');
        
        // 渲染清單，已提醒項目排在下方並灰化
        const sortedTasks = tasks.sort((a,b)=>new Date(a.time)-new Date(b.time));
        const waitingTasks = sortedTasks.filter(t => t.status === 'waiting');
        const notifiedTasks = sortedTasks.filter(t => t.status === 'notified').reverse();
        const displayTasks = waitingTasks.concat(notifiedTasks);

        listDiv.innerHTML = displayTasks.map(t => `
            <div class="item ${t.status === 'notified' ? 'notified' : ''}">
                <div class="item-info">
                    <b>${t.name}</b>
                    <span>⏰ ${t.time.replace('T', ' ')}</span>
                    <span class="status-tag ${t.status === 'notified' ? 'tag-notified' : 'tag-waiting'}">
                        ${t.status === 'notified' ? '✅ 已提醒過您了' : '⏳ 正在等待時間到'}
                    </span>
                    <span style="font-size: 1.1rem; ${t.useAlarm ? 'color:var(--active-green);font-weight:bold;' : 'color:#888;'}">
                        ${t.useAlarm ? '🔔 已開啟響鈴' : '🔕 僅文字提醒'}
                    </span>
                </div>
                <div class="item-actions">
                    <button class="btn-action btn-edit" onclick="editTask(${t.id})">✏️ 改一下</button>
                    <button class="btn-action btn-del" onclick="deleteTask(${t.id})">❌ 刪除</button>
                </div>
            </div>
        `).join('');
    }

    function editTask(id) {
        const tasks = JSON.parse(localStorage.getItem(LOCAL_STORAGE_KEY) || '[]');
        const task = tasks.find(t => t.id === id);
        if (task) {
            document.getElementById('tName').value = task.name;
            document.getElementById('tTime').value = task.time;
            document.getElementById('tAlarmActive').checked = task.useAlarm; // 還原 checkbox 狀態
            editingId = id;
            
            // 變更 UI 狀態
            const saveBtn = document.getElementById('saveBtn');
            saveBtn.innerText = "🆙 更新我的行程";
            saveBtn.className = "btn btn-update";
            document.getElementById('cancelEdit').style.display = "block";
            window.scrollTo({ top: 0, behavior: 'smooth' }); // 回到頂端方便修改
        }
    }

    function cancelEdit() {
        editingId = null;
        document.getElementById('tName').value = "";
        document.getElementById('tAlarmActive').checked = true; // 重設 checkbox
        setDefaultTime();
        resetUI();
    }

    function resetUI() {
        const saveBtn = document.getElementById('saveBtn');
        saveBtn.innerText = "💾 記下來";
        saveBtn.className = "btn btn-save";
        document.getElementById('cancelEdit').style.display = "none";
    }

    function deleteTask(id) {
        let tasks = JSON.parse(localStorage.getItem(LOCAL_STORAGE_KEY) || '[]');
        localStorage.setItem(LOCAL_STORAGE_KEY, JSON.stringify(tasks.filter(t=>t.id!==id)));
        render();
    }

    function checkReminders() {
        let tasks = JSON.parse(localStorage.getItem(LOCAL_STORAGE_KEY) || '[]');
        const now = new Date();
        let updated = false;

        tasks.forEach(t => {
            // 檢查狀態為等待且時間到了
            if (t.status === 'waiting' && new Date(t.time) <= now) {
                triggerReminder(t);
                t.status = 'notified'; // 狀態改為已提醒
                updated = true;
            }
        });
        if (updated) {
            localStorage.setItem(LOCAL_STORAGE_KEY, JSON.stringify(tasks));
            render();
        }
    }

    function triggerReminder(task) {
        // 1. 顯示全螢幕通知 (長輩最容易看到)
        document.getElementById('alarmOverlay').style.display = 'flex';
        document.getElementById('alarmContent').innerText = task.name;

        // 2. 判斷是否要響鈴
        if (task.useAlarm) {
            sound.play().catch(e => console.log("聲音播放失敗"));
        }

        // 3. 語音唸出來 (強迫提醒)
        const utter = new SpeechSynthesisUtterance("火星提醒，時間到囉，記得去做 " + task.name);
        utter.lang = 'zh-TW';
        window.speechSynthesis.speak(utter);

        // 4. 系統通知
        if (Notification.permission === "granted") {
            new Notification("⏰ 時間到！", { 
                body: task.name,
                icon: "data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCAxMDAgMTAwIj48Y2lyY2xlIGN4PSI1MCIgY3k9IjUwIiByPSI0OCIgZmlsbD0iI2ZmNTcyMiIgc3Ryb2tlPSIjYmYzNjBjIiBzdHJva2Utd2lkdGg9IjIiLz48ZWxsaXBzZSBjeD0iMzAiIGN5PSI0MCIgcng9IjEwIiByeT0iNyIgZmlsbD0iI2JmMzYwYyIgb3BhY2l0eT0iMC43Ii8+PGVsbGlwc2UgY3g9IjcwIiBjeT0iNjAiIHJ4PSI4IiByeT0iNSIgZmlsbD0iI2JmMzYwYyIgb3BhY2l0eT0iMC43Ii8+PHBhdGggZD0iTSAxNSA2NSBRIDQwIDgwIDg1IDU1IiBzdHJva2U9IiNiZjM2MGMiIHN0cm9rZS13aWR0aD0iMyIgZmlsbD0ibm9uZSIgb3BhY2l0eT0iMC44Ii8+PC9zdmc+"
            });
        }
    }

    function stopAlarm() {
        sound.pause();
        sound.currentTime = 0;
        document.getElementById('alarmOverlay').style.display = 'none';
        window.speechSynthesis.cancel(); // 強制停止說話唸稿
    }

    function startVoice() {
        const btn = document.getElementById('voiceBtn');
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (!SpeechRecognition) return alert("這台設備不支援語音輸入功能。");

        const recognition = new SpeechRecognition();
        recognition.lang = 'zh-TW';
        recognition.onstart = () => btn.classList.add('recording');
        recognition.onresult = (e) => document.getElementById('tName').value = e.results[0][0].transcript;
        recognition.onend = () => btn.classList.remove('recording');
        recognition.onerror = () => btn.classList.remove('recording');
        recognition.start();
    }
</script>
</body>
</html>
